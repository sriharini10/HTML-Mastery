<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>iframe tag in HTML</h1>
    <h2>Embedding External Webpages by using iframe tag</h2>
    <iframe
      src="https://www.flipkart.com/"
      frameborder="1"
      width="800"
      height="500"
    ></iframe>

    <hr />

    <h2>Embedding our own internal Webpages by using iframe tag</h2>
    <iframe
      src="./video_tag.html"
      frameborder="1"
      width="800"
      height="500"
    ></iframe>

    <hr />

    <h2>Embedding Youtube videos by using iframe tag</h2>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/Z0LnXL4sdA0?si=OwCUK2Grpj5OqrHQ"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <hr />

    <h2>Embedding google maps by using iframe tag</h2>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7828.952818561449!2d79.60345743939236!3d11.152318982357768!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a552779b6d71789%3A0xfd9a7b191f961631!2sKorukkai%2C%20Tamil%20Nadu%20609203!5e0!3m2!1sen!2sin!4v1777623327851!5m2!1sen!2sin"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <hr>

   
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <fieldset>
        <legend><h1>Student Registration Form</h1></legend>
        <form action="">
        <div>
        <label for="">FirstName:</label>
        <input type="text" />
    </div>
    
    <br>

    <div>
        <label for="">LastName:</label>
        <input type="text" />
    </div>

        <br>
        
        <div>
            <label for="">Gender</label>
            <input type="radio" name="Gender" id="">Male
            <input type="radio" name="Gender" id="">Female
            <input type="radio" name="Gender" id="">Others
        </div>

        <br>

        <div>
            <label for="">DOB:</label>
            <input type="datetime" name="" id="">
        </div>

        <br>

        <div>
            <label for="">Skills:</label>
            <input type="checkbox" name="" id="">HTML
            <input type="checkbox" name="" id="">CSS
            <input type="checkbox" name="" id="">JS
            <input type="checkbox" name="" id="">Java
            <input type="checkbox" name="" id="">SQL
        </div>


        <br>

        <div>
            <label for="">Upload Your Resume</label>
            <input type="file" name="" id="">
        </div>

        <br>

        <div>
            <label for="">Select the slots</label>
            <input type="number" name="" id="">
        </div>

        <br>

        <div>
            <input type="checkbox" name="" id="">
            <label for="">I accept the terms and conditions</label>
        </div>

        <br>

        <div>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>

    </fieldset>
    
    </form>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Login Form</h1>

    <form action="">
      <div>
        <label>Email:</label>
        <input type="email" placeholder="Enter your email here" required />
      </div>

      <br />

      <div>
        <label>Password:</label>
        <input
          type="password"
          placeholder="Enter your password here"
          required
        />
      </div>

      <br />

      <button>Login</button>
    </form>
  </body>
</html>

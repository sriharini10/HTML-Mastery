<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>minlength and maxlength in HTML</h1>

    <form action="">
      <div>
        <label for="">Aadhar Number:</label>
        <input type="text" name="" id="" value="1234 5678 9012" readonly />
      </div>
      <br />
      <div>
        <label for="">Password:</label>
        <input
          type="text"
          name=""
          id=""
          placeholder="Enter a password of min 3 and max 8"
          size="50"
          minlength="3"
          maxlength="8"
        />
      </div>

      <br />

      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>min and max attribute in HTML</h1>

    <form action="">
      <div>
        <label for="">Select a course price:</label>
        <input type="range" name="courseprice" min="5000" max="30000" id="" />
      </div>

      <br />

      <div>
        <label for="">Select a interviw slot:</label>
        <input
          type="date"
          name="slot"
          min="2026-05-01"
          max="2026-05-20"
          id=""
        />
      </div>

      <br />

      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
  </body>
</html>

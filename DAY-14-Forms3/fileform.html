<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>File Validation in HTML</h1>

    <form action="">

        <div>
            <label for="">Upload Resume:</label>
            <input type="file" accept=".pdf,.doc" multiple name="" id="">
        </div>

        <br>

        <div>
            <label for="">Upload Profile:</label>
            <input type="file" accept="image/*" name="" id="">
        </div>

        <br>

        <div>
            <label for="">Upload Audio:</label>
            <input type="file" accept="audio/*" name="" id="">
        </div>

        <br>

        <div>
            <label for="">Upload Video:</label>
            <input type="file" accept="video/*" name="" id="">
        </div>

        <br>

        <div>
            <button type="submit">Submit</button>
        </div>

    </form>
</body>
</html>

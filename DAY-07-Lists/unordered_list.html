<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>2. Unordered List in HTML</h1>
    <h2>type = disc (default)</h2>
    <ul type="disc">
      <li>Pizza</li>
      <li>Burger</li>
      <li>Fries</li>
      <li>Coke</li>
    </ul>
    <hr />
    <h2>type = circle</h2>
    <ul type="circle">
      <li>Pizza</li>
      <li>Burger</li>
      <li>Fries</li>
      <li>Coke</li>
    </ul>
    <hr />
    <h2>type = square</h2>
    <ul type="square">
      <li>Pizza</li>
      <li>Burger</li>
      <li>Fries</li>
      <li>Coke</li>
    </ul>
    <hr />
    <h2>type = none</h2>
    <ul type="none">
      <li>Home</li>
      <li>Login</li>
      <li>Register</li>
    </ul>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* h2 {
        color: red;
      } */
      #head2 {
        color: red;
      }
      #head3 {
        color: blue;
      }
      .para {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <h1>1. Core Attributes</h1>
    <!-- id attribute -->
    <h2 id="head2">Heading-2</h2>
    <h2 id="head3" class="para">Heading-3</h2>
    <hr />

    <!-- class attribute -->
     <!-- p*3{Content-$} -->
    <p class="para" title="This is a paragraph-1">Content-1</p>
    <p class="para" title="This is a paragraph-2">Content-2</p>
    <p class="para">Content-3</p>
    <hr>

    <!-- style attribute -->
    <div style="width: 100px; height: 100px; background-color: teal"></div>
  </body>
</html>

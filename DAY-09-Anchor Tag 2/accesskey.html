<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>accesskey attribute in Anchor Tag</h1>
    <h2>ALT + Alphabet</h2>
    <a accesskey="g" href="https://www.google.com">Google</a>
    <a accesskey="k" href="https://www.facebook.com">Facebook</a>
    <a accesskey="i" href="https://www.instagram.com">Instagram</a>
  </body>
</html>

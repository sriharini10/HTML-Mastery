<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Marquee tag in HTML</h1>

    <marquee behavior="scroll" direction="left" bgcolor="aqua">
      🚀Text is moving from right to left🚀
    </marquee>

    <marquee behavior="scroll" direction="right" scrollamount="60">
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPINX51hxYxFxCP5lx9tsdVi3UogZK2g6vCw&s"
        alt=""
        
        width="100"
        height="100"
      />default scrollamount 6ms
    </marquee>

    <marquee behavior="scroll" direction="up" bgcolor="yellow" height="300" width="300">it move from bottom to top</marquee>

    <marquee behavior="scroll" direction="down" bgcolor="red" height="300" width="300">it move from up to down</marquee>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>hspace and vspace in HTML</h1>

    <marquee behavior="scroll" direction="left" bgcolor="purple" scrollamount="30" hspace="300" height="100">Equal space created from left and right side</marquee>
     <marquee behavior="scroll" direction="left" bgcolor="green" scrollamount="30" vspace="300" height="100">Equal space created from up and downside</marquee>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>marquee tag = alternate behaviour</h1>

    <marquee
      behavior="alternate"
      direction="left"
      scrolldelay="99"
      >
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQbCOP1sWa-_VAu8mXN2LSInyERe90lU-46FQ&s" alt="">
    </marquee>

    <marquee
      behavior="alternate"
      direction="right"
      scrollamount="69"
      >
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQbCOP1sWa-_VAu8mXN2LSInyERe90lU-46FQ&s" alt="">
    </marquee>

    <marquee
      behavior="alternate"
      direction="right"
      scrollamount="69"
      >
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQbCOP1sWa-_VAu8mXN2LSInyERe90lU-46FQ&s" alt="">
    </marquee>
  </body>
</html>
